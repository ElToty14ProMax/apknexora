limit_req_zone $binary_remote_addr zone=nexora_api:10m rate=10r/s;

server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65s;
    open_file_cache max=1000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    client_max_body_size 6m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https:; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        image/svg+xml
        text/css
        text/plain;

    location = /api {
        return 301 /api/;
    }

    location ^~ /api/ {
        limit_req zone=nexora_api burst=30 nodelay;
        rewrite ^/api/?(.*)$ /$1 break;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/nexora/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/nexora/public;
        fastcgi_param REQUEST_URI $uri$is_args$args;
        fastcgi_param DOCUMENT_URI $uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 65s;
        fastcgi_read_timeout 65s;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 32k;
        fastcgi_keep_conn on;
        fastcgi_pass app:9000;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /downloads/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
