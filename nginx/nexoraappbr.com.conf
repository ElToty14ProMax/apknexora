limit_req_zone $binary_remote_addr zone=nexora_api:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name nexoraappbr.com www.nexoraappbr.com;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/nexora/nexora-web/dist;
        allow all;
        try_files $uri =404;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nexoraappbr.com www.nexoraappbr.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/nexoraappbr.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexoraappbr.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/nexora/nexora-web/dist;
    index index.html;
    client_max_body_size 8m;
    limit_req_status 429;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https:; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    access_log /var/log/nginx/nexoraappbr.access.log;
    error_log /var/log/nginx/nexoraappbr.error.log;

    location = /health {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/nexora/backend-laravel/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/nexora/backend-laravel/public;
        fastcgi_param REQUEST_URI /health;
        fastcgi_param DOCUMENT_URI /index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO "";
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS on;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location = /api {
        return 301 /api/;
    }

    location ^~ /api/ {
        limit_req zone=nexora_api burst=30 nodelay;
        rewrite ^/api/(.*)$ /$1 break;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/nexora/backend-laravel/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/nexora/backend-laravel/public;
        fastcgi_param REQUEST_URI $uri$is_args$args;
        fastcgi_param DOCUMENT_URI $uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS on;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ^~ /auth/ {
        limit_req zone=nexora_api burst=20 nodelay;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/nexora/backend-laravel/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/nexora/backend-laravel/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS on;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ^~ /admin/ {
        limit_req zone=nexora_api burst=20 nodelay;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/nexora/backend-laravel/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/nexora/backend-laravel/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS on;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /downloads/ {
        try_files $uri =404;
        types { application/vnd.android.package-archive apk; }
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
